<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành Trình Khám Phá Hình Khối</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Three.js cho mô hình 3D tĩnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #334155; overflow-x: hidden; }
        .station-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .cornell-box { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        
        /* CSS 3D Folding Net */
        .scene-3d { perspective: 1000px; width: 100%; height: 300px; display: flex; justify-content: center; align-items: center; }
        .box-wrapper { position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-30deg); transition: transform 0.1s; }
        .face { position: absolute; transform-style: preserve-3d; border: 2px solid #4f46e5; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #312e81; opacity: 0.9; }
        .face-bottom { background-color: #e0e7ff; transform-origin: center; }
        .face-front { background-color: #a5b4fc; transform-origin: bottom; }
        .face-back { background-color: #c7d2fe; transform-origin: top; }
        .face-left { background-color: #818cf8; transform-origin: right; }
        .face-right { background-color: #6366f1; transform-origin: left; }
        .face-top { background-color: #4f46e5; color: white; transform-origin: top; }
        
        input[type=range] { accent-color: #4f46e5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const { useState, useEffect, useRef } = React;

        // Firebase Setup (Tích hợp cơ chế tự bảo vệ khi chạy Local)
        let app, auth, db;
        try {
            const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (firebaseConfigStr) {
                const firebaseConfig = JSON.parse(firebaseConfigStr);
                if (Object.keys(firebaseConfig).length > 0) {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                }
            }
        } catch (e) {
            console.warn("Khởi tạo Firebase thất bại. Ứng dụng sẽ chạy ở chế độ Local.", e);
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- ICONS ---
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-green-500"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconClock = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCloud = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>;
        const IconAlert = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-500"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconLock = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

        // --- CUSTOM UI MODAL ---
        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                    <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full text-center station-enter">
                        <div className="flex justify-center mb-4"><IconAlert /></div>
                        <h3 className="text-lg font-bold text-slate-800 mb-2">Thông báo</h3>
                        <p className="text-slate-600 mb-6" dangerouslySetInnerHTML={{__html: message}}></p>
                        <button onClick={onClose} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors w-full">
                            Đã hiểu
                        </button>
                    </div>
                </div>
            );
        };

        // --- COMPONENTS ---

        // Cornell Note Template
        const CornellNote = ({ title, data, onChange, defaultCues, defaultNotes, defaultSummary }) => (
            <div className="bg-white rounded-xl cornell-box overflow-hidden border border-slate-200 shadow-sm">
                <div className="bg-indigo-600 text-white p-3 text-center font-bold text-lg">{title}</div>
                <div className="flex flex-col md:flex-row border-b border-slate-200 min-h-[300px]">
                    <div className="w-full md:w-1/3 border-r border-slate-200 p-4 bg-indigo-50/50 flex flex-col">
                        <label className="font-bold text-indigo-800 text-sm mb-2 uppercase tracking-wide">Từ khóa / Câu hỏi</label>
                        <textarea 
                            className="flex-1 w-full bg-transparent resize-none outline-none text-slate-700 font-medium" 
                            placeholder="Ghi các cụm từ chính..."
                            value={data.cues !== undefined ? data.cues : defaultCues} 
                            onChange={(e) => onChange('cues', e.target.value)}
                        />
                    </div>
                    <div className="w-full md:w-2/3 p-4 flex flex-col">
                        <label className="font-bold text-indigo-800 text-sm mb-2 uppercase tracking-wide">Ghi chép chính</label>
                        <textarea 
                            className="flex-1 w-full bg-transparent resize-none outline-none text-slate-700 leading-relaxed" 
                            placeholder="Diễn giải chi tiết kiến thức..."
                            value={data.notes !== undefined ? data.notes : defaultNotes} 
                            onChange={(e) => onChange('notes', e.target.value)}
                        />
                    </div>
                </div>
                <div className="p-4 bg-slate-50 flex flex-col min-h-[100px]">
                    <label className="font-bold text-indigo-800 text-sm mb-2 uppercase tracking-wide">Tóm tắt</label>
                    <textarea 
                        className="flex-1 w-full bg-transparent resize-none outline-none text-slate-700 italic" 
                        placeholder="Tóm tắt lại ý chính bằng 1-2 câu..."
                        value={data.summary !== undefined ? data.summary : defaultSummary} 
                        onChange={(e) => onChange('summary', e.target.value)}
                    />
                </div>
            </div>
        );

        // Smart Input Check
        const SmartCheck = ({ question, hint, value, onChange, checkLogic, explanation, showAlert }) => {
            const [isCorrect, setIsCorrect] = useState(false);
            const [showHint, setShowHint] = useState(false);

            const handleCheck = () => {
                if (checkLogic(value || '')) {
                    setIsCorrect(true);
                } else {
                    showAlert("Chưa chính xác! Em hãy đọc kỹ gợi ý và quan sát hình thật cẩn thận để nhập lại nhé.");
                }
            };

            useEffect(() => {
                if (value && checkLogic(value)) setIsCorrect(true);
            }, [value]);

            return (
                <div className={`bg-white p-5 rounded-xl border transition-all duration-300 shadow-sm mb-4 ${isCorrect ? 'border-green-300 bg-green-50/30' : 'border-slate-200'}`}>
                    <p className="font-semibold text-slate-800 mb-3 leading-relaxed" dangerouslySetInnerHTML={{__html: question}}></p>
                    <div className="flex flex-col sm:flex-row gap-3 mb-2">
                        <input 
                            type="text" value={value || ''} onChange={(e) => {onChange(e.target.value); setIsCorrect(false);}}
                            disabled={isCorrect}
                            className={`flex-1 p-3 border rounded-lg outline-none transition-colors ${isCorrect ? 'bg-green-100 border-green-400 text-green-800 font-bold cursor-not-allowed' : 'focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100'}`}
                            placeholder="Nhập câu trả lời..."
                        />
                        {!isCorrect ? (
                            <button onClick={handleCheck} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors shadow-sm whitespace-nowrap">Kiểm tra</button>
                        ) : (
                            <div className="flex items-center justify-center gap-2 bg-green-500 text-white px-6 py-2 rounded-lg font-bold whitespace-nowrap shadow-sm"><IconCheck/> Chính xác!</div>
                        )}
                    </div>
                    {!isCorrect && (
                        <button onClick={() => setShowHint(!showHint)} className="text-sm text-amber-600 font-medium hover:underline mt-1">
                            {showHint ? 'Ẩn gợi ý' : '👉 Nhấn để xem gợi ý'}
                        </button>
                    )}
                    {showHint && !isCorrect && <div className="text-sm bg-amber-50 p-3 mt-2 rounded border border-amber-200 text-amber-800 italic" dangerouslySetInnerHTML={{__html: hint}}></div>}
                    {isCorrect && explanation && (
                        <div className="mt-4 p-4 bg-white rounded-lg border border-green-200 text-sm text-slate-700 shadow-sm">
                            <strong className="text-green-700 flex items-center gap-1 mb-1">💡 Giải thích chi tiết:</strong> 
                            <span dangerouslySetInnerHTML={{__html: explanation}} className="leading-relaxed" />
                        </div>
                    )}
                </div>
            );
        };

        // --- THREE.JS COMPONENT (Mô hình 3D tĩnh) ---
        const Static3DBox = ({ boxWidth, boxHeight, boxDepth, labels, isCube }) => {
            const mountRef = useRef(null);

            useEffect(() => {
                const currentMount = mountRef.current;
                if (!currentMount) return;

                const w = currentMount.clientWidth || 300;
                const h = currentMount.clientHeight || 400; 

                // Cài đặt Scene
                const scene = new THREE.Scene();
                scene.background = null;

                // Cài đặt Camera cố định cho góc nhìn tĩnh đẹp nhất
                const camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 1000);
                camera.position.set(4.5, 3.5, 6.5); 
                camera.lookAt(0, 0, 0);

                // Cài đặt Renderer chống răng cưa
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(w, h);
                renderer.setPixelRatio(window.devicePixelRatio);
                currentMount.appendChild(renderer.domElement);

                // Tạo hình khối
                const geometry = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
                const material = new THREE.MeshBasicMaterial({ 
                    color: isCube ? 0xf59e0b : 0x4f46e5, 
                    transparent: true, 
                    opacity: 0.1, // Làm mờ mặt để đường nét nổi bật lên
                    side: THREE.DoubleSide,
                    depthWrite: false 
                });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // Viền cạnh (Edges) màu đen đậm
                const edges = new THREE.EdgesGeometry(geometry);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 3 }); 
                const wireframe = new THREE.LineSegments(edges, lineMaterial);
                scene.add(wireframe);

                // Vẽ 4 đường chéo không gian (Nét đứt, đỏ đậm)
                const diagMaterial = new THREE.LineDashedMaterial({ color: 0xdc2626, dashSize: 0.25, gapSize: 0.15, linewidth: 3 });
                
                const bw = boxWidth/2, bh = boxHeight/2, bd = boxDepth/2;
                const vA = new THREE.Vector3(-bw, bh, bd);
                const vB = new THREE.Vector3(bw, bh, bd);
                const vC = new THREE.Vector3(bw, bh, -bd);
                const vD = new THREE.Vector3(-bw, bh, -bd);
                const vM = new THREE.Vector3(-bw, -bh, bd);
                const vN = new THREE.Vector3(bw, -bh, bd);
                const vP = new THREE.Vector3(bw, -bh, -bd);
                const vQ = new THREE.Vector3(-bw, -bh, -bd);

                const diagonals = [
                    [vA, vP], // A nối P
                    [vB, vQ], // B nối Q
                    [vC, vM], // C nối M
                    [vD, vN]  // D nối N
                ];

                diagonals.forEach(pair => {
                    const diagGeo = new THREE.BufferGeometry().setFromPoints(pair);
                    const diagLine = new THREE.Line(diagGeo, diagMaterial);
                    diagLine.computeLineDistances(); 
                    scene.add(diagLine);
                });

                // Khởi tạo các nhãn (Labels) cực kỳ nổi bật kèm offset để tránh đè lên góc
                const labelDivs = [];
                const labelData = [
                    { pos: vA, text: labels[0], offset: {x: -12, y: -15} }, 
                    { pos: vB, text: labels[1], offset: {x: 12, y: -15} },
                    { pos: vC, text: labels[2], offset: {x: 12, y: -15} }, 
                    { pos: vD, text: labels[3], offset: {x: -12, y: -15} },
                    { pos: vM, text: labels[4], offset: {x: -12, y: 15} }, 
                    { pos: vN, text: labels[5], offset: {x: 12, y: 15} },
                    { pos: vP, text: labels[6], offset: {x: 12, y: 15} }, 
                    { pos: vQ, text: labels[7], offset: {x: -12, y: 15} }
                ];

                labelData.forEach(item => {
                    const div = document.createElement('div');
                    div.textContent = item.text;
                    div.style.position = 'absolute';
                    div.style.color = '#000000'; // Chữ đen
                    div.style.fontWeight = '900'; // Rất đậm
                    div.style.fontSize = '22px'; // To rõ ràng
                    div.style.textShadow = '2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white, 0px 2px 0px white, 0px -2px 0px white, 2px 0px 0px white, -2px 0px 0px white';
                    div.style.transform = 'translate(-50%, -50%)'; 
                    div.style.pointerEvents = 'none'; 
                    currentMount.appendChild(div);
                    labelDivs.push({ div, pos: item.pos, offset: item.offset });
                });

                // Vòng lặp Render (để xử lý re-size và định vị lại nhãn HTML)
                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    
                    const cw = currentMount.clientWidth || 300;
                    const ch = currentMount.clientHeight || 400;

                    if (camera.aspect !== cw / ch) {
                        camera.aspect = cw / ch;
                        camera.updateProjectionMatrix();
                        renderer.setSize(cw, ch);
                    }
                    
                    // Cập nhật vị trí nhãn 2D
                    labelDivs.forEach(item => {
                        const vector = item.pos.clone().project(camera);
                        const x = (vector.x * 0.5 + 0.5) * cw + item.offset.x;
                        const y = (vector.y * -0.5 + 0.5) * ch + item.offset.y;
                        item.div.style.left = `${x}px`;
                        item.div.style.top = `${y}px`;
                    });

                    renderer.render(scene, camera);
                };
                animate();

                // Cleanup
                return () => {
                    cancelAnimationFrame(animationId);
                    if (currentMount) {
                        if (currentMount.contains(renderer.domElement)) currentMount.removeChild(renderer.domElement);
                        labelDivs.forEach(item => {
                            if(currentMount.contains(item.div)) currentMount.removeChild(item.div);
                        });
                    }
                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, [boxWidth, boxHeight, boxDepth, labels, isCube]);

            return <div ref={mountRef} className="w-full h-[400px] rounded-xl overflow-hidden relative border-2 border-slate-200 shadow-inner bg-slate-50">
            </div>;
        };

        // --- CSS 3D STATIC NET COMPONENT (Trạm 3) ---
        const StaticNet = ({ isCube }) => {
            const a = isCube ? 100 : 120; 
            const b = isCube ? 100 : 80;  
            const h = isCube ? 100 : 60;  

            // Hình trải phẳng nên góc = 0
            const angle = 0;

            return (
                <div className="scene-3d mb-8 mt-4">
                    <div className="box-wrapper" style={{ transform: `rotateX(-20deg) rotateY(-40deg) translateY(${h/2}px)` }}>
                        {/* Đáy dưới */}
                        <div className="face face-bottom" style={{ width: a, height: b, transform: `rotateX(90deg) translateZ(0px)` }}>Đáy dưới</div>
                        
                        {/* Mặt trước */}
                        <div className="face face-front" style={{ width: a, height: h, transform: `rotateX(${90 - angle}deg) translateZ(${b/2}px) translateY(${-h/2}px)` }}>
                            Mặt trước
                            {/* Nắp trên */}
                            <div className="face face-top" style={{ width: a, height: b, transform: `rotateX(${-angle}deg) translateZ(${h/2}px) translateY(${-b/2}px)` }}>Mặt trên</div>
                        </div>
                        
                        {/* Mặt sau */}
                        <div className="face face-back" style={{ width: a, height: h, transform: `rotateX(${90 + angle}deg) translateZ(${-b/2}px) translateY(${-h/2}px)` }}>Mặt sau</div>
                        {/* Mặt trái */}
                        <div className="face face-left" style={{ width: b, height: h, transform: `rotateY(90deg) rotateX(${-angle}deg) translateZ(${-a/2}px) translateY(${-h/2}px)` }}>Trái</div>
                        {/* Mặt phải */}
                        <div className="face face-right" style={{ width: b, height: h, transform: `rotateY(90deg) rotateX(${angle}deg) translateZ(${a/2}px) translateY(${-h/2}px)` }}>Phải</div>
                    </div>
                </div>
            );
        };

        // --- VALIDATION HELPERS ---
        const hasAllVertices = (v) => {
            if (!v) return false;
            if (!v.includes(',')) return false; 
            const arr = v.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
            const req = ['A','B','C','D','M','N','P','Q'];
            return req.every(char => arr.includes(char)) && arr.length >= 8;
        };

        const hasAllDiagonals = (v) => {
            if (!v) return false;
            const str = v.toUpperCase();
            const checkPair = (p1, p2) => str.includes(p1) || str.includes(p2);
            return checkPair('AP','PA') && checkPair('BQ','QB') && checkPair('CM','MC') && checkPair('DN','ND');
        };

        const hasAllSideFaces = (v) => {
            if (!v) return false;
            const str = v.toUpperCase().replace(/[^A-Z]/g, ' ');
            const words = str.split(/\s+/).filter(w => w.length === 4);
            const isValid = (word, c1, c2) => c1.includes(word) || c2.includes(word);
            
            const hasF1 = words.some(w => isValid(w, "ABNMABNM", "AMNBAMNB"));
            const hasF2 = words.some(w => isValid(w, "BCPNBCPN", "BNPCBNPC"));
            const hasF3 = words.some(w => isValid(w, "DCPQDCPQ", "DQPCDQPC"));
            const hasF4 = words.some(w => isValid(w, "ADQMADQM", "AMQDAMQD"));
            
            return hasF1 && hasF2 && hasF3 && hasF4;
        };

        const hasProperties = (v) => {
            if (!v) return false;
            const str = v.toLowerCase();
            return str.includes('chữ nhật') && str.includes('vuông');
        };

        const hasCubeBases = (v) => {
            if (!v) return false;
            const s = v.toUpperCase();
            const hasPrime = s.includes("E'") && s.includes("I'") && s.includes("K'") && s.includes("F'");
            const hasE = /E(?!')/.test(s);
            const hasI = /I(?!')/.test(s);
            const hasK = /K(?!')/.test(s);
            const hasF = /F(?!')/.test(s);
            return hasPrime && hasE && hasI && hasK && hasF;
        };

        const hasCubeEdges = (v) => {
            if (!v) return false;
            return v.toLowerCase().includes('bằng nhau');
        };

        // --- STATIONS ---

        // TRẠM 1: QUAN SÁT (TĨNH)
        const Station1 = ({ data, updateData, showAlert }) => {
            return (
                <div className="station-enter space-y-6">
                    <div className="text-center">
                        <h2 className="text-3xl font-extrabold text-indigo-700 drop-shadow-sm">Trạm 1: Chạm Vào Không Gian</h2>
                        <p className="text-slate-600 mt-2">Quan sát các mô hình tĩnh dưới đây để nhận diện các đặc điểm của hình khối nhé!</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6 mb-8">
                        {/* Hình Hộp Chữ Nhật Tĩnh */}
                        <div className="flex flex-col items-center bg-white rounded-xl p-4 border border-indigo-100 shadow-sm">
                            <h3 className="font-bold text-indigo-800 mb-4 bg-indigo-50 px-4 py-1 rounded-full text-lg">Hình Hộp Chữ Nhật ABCD.MNPQ</h3>
                            <Static3DBox boxWidth={3.0} boxHeight={1.8} boxDepth={1.8} labels={['A','B','C','D','M','N','P','Q']} isCube={false} />
                        </div>

                        {/* Hình Lập Phương Tĩnh */}
                        <div className="flex flex-col items-center bg-white rounded-xl p-4 border border-amber-100 shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-4 bg-amber-50 px-4 py-1 rounded-full text-lg">Hình Lập Phương EIKF.E'I'K'F'</h3>
                            <Static3DBox boxWidth={2.2} boxHeight={2.2} boxDepth={2.2} labels={['E','I','K','F',"E'","I'","K'","F'"]} isCube={true} />
                        </div>
                    </div>
                    
                    <div className="text-sm bg-indigo-50/80 border border-indigo-200 p-4 rounded-xl text-indigo-800 shadow-sm">
                        <span className="font-bold text-base">⚠️ Quy tắc nhập liệu vượt trạm:</span><br/>
                        - Em có thể đổi thứ tự chữ cái khi đọc tên mặt, cạnh (Ví dụ mặt <i>ABNM</i> hay <i>NMAB</i> đều đúng, miễn là đọc đúng một vòng quanh mặt).<br/>

        const Station4 = ({ data, updateData }) => {
            const defaultCues = "1. Diện tích xung quanh (Sxq)\n2. Diện tích toàn phần (Stp)\n3. Thể tích (V)";
            const defaultNotes = "HÌNH HỘP CHỮ NHẬT:\n- Sxq = Chu vi đáy × chiều cao = 2(a+b)h\n- Stp = Sxq + Diện tích 2 đáy\n- V = Diện tích đáy × chiều cao = a × b × h\n\nHÌNH LẬP PHƯƠNG (Cạnh a):\n- Sxq = 4 × a²\n- Stp = 6 × a²\n- V = a³";
            const defaultSummary = "Để tính Sxq hay V, ta luôn ghi nhớ quy luật: Sxq liên quan đến Chu vi đáy × h; Thể tích liên quan đến Diện tích đáy × h.";

            return (
                <div className="station-enter space-y-4">
                    <div className="text-center mb-4">
                        <h2 className="text-2xl font-bold text-indigo-700">Trạm 4: Nhật Ký Công Thức</h2>
                        <p className="text-slate-500">Các công thức đã được tổng hợp sẵn. Em hãy chép vào vở để không bao giờ quên nhé!</p>
                    </div>
                    <CornellNote 
                        title="Công thức Diện tích & Thể tích" 
                        data={data.cn2 || {}} 
                        onChange={(f, v) => updateData('cn2', {...(data.cn2||{}), [f]: v})} 
                        defaultCues={defaultCues}
                        defaultNotes={defaultNotes}
                        defaultSummary={defaultSummary}
                    />
                </div>
            );
        };

        // TRẠM 5: ỨNG DỤNG
        const Station5 = ({ data, updateData, showAlert }) => {
            return (
                <div className="station-enter space-y-6">
                    <div className="text-center">
                        <h2 className="text-2xl font-bold text-indigo-700">Trạm 5: Kỹ Sư Tập Sự</h2>
                        <p className="text-slate-500">Áp dụng công thức để tính toán các bài toán thực tế.</p>
                    </div>

                    <SmartCheck 
                        question="Bài 1: Một bể cá hình hộp chữ nhật dài 50cm, rộng 30cm, cao 40cm. Tính thể tích của bể cá đó (cm³)."
                        hint="V = a × b × h. Em lấy 50 × 30 × 40 nhé."
                        value={data.s5_q1} onChange={(v) => updateData('s5_q1', v)}
                        checkLogic={(v) => (v||'').includes('60000') || (v||'').includes('60.000')}
                        showAlert={showAlert}
                        explanation="Chuẩn! V = 50 × 30 × 40 = <b>60,000 cm³</b>."
                    />

                    <SmartCheck 
                        question="Bài 2: Một khối Rubik hình lập phương có cạnh 6cm. Bạn An muốn dán giấy decal màu xung quanh 4 mặt bên. Tính diện tích giấy decal cần dùng (cm²)."
                        hint="Đây là Diện tích xung quanh (Sxq) của hình lập phương. Sxq = 4 × cạnh × cạnh."
                        value={data.s5_q2} onChange={(v) => updateData('s5_q2', v)}
                        checkLogic={(v) => (v||'').includes('144')}
                        showAlert={showAlert}
                        explanation="Rất tốt! Diện tích 1 mặt = 6 × 6 = 36 cm². Giấy dán 4 mặt bên (Sxq) = 4 × 36 = <b>144 cm²</b>."
                    />

                     <SmartCheck 
                        question="Bài 3: Một căn phòng hình hộp chữ nhật dài 6m, rộng 4m, cao 3m. Tính diện tích 4 bức tường xung quanh phía trong phòng (m²)."
                        hint="Diện tích 4 bức tường chính là Sxq. Tính Chu vi đáy trước: 2 × (6 + 4), sau đó nhân với chiều cao 3."
                        value={data.s5_q3} onChange={(v) => updateData('s5_q3', v)}
                        checkLogic={(v) => (v||'').includes('60')}
                        showAlert={showAlert}
                        explanation="Hoàn hảo! Chu vi đáy = 2 × (6 + 4) = 20 m. Diện tích tường = Sxq = 20 × 3 = <b>60 m²</b>."
                    />

                    <div className="bg-gradient-to-r from-emerald-50 to-teal-50 p-6 rounded-xl text-center mt-8 border border-emerald-200 shadow-md">
                        <h3 className="font-extrabold text-emerald-800 text-2xl mb-2 flex justify-center items-center gap-2">
                            🎉 Chúc mừng kỹ sư tài ba!
                        </h3>
                        <p className="text-emerald-700 font-medium">Em đã hoàn thành xuất sắc nhiệm vụ. Mọi ghi chép đã được lưu trữ an toàn.</p>
                    </div>
                </div>
            );
        };

        // --- APP CONTAINER ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            
            const [studentName, setStudentName] = useState("");
            const [currentStation, setCurrentStation] = useState(0); 
            const [timeLeft, setTimeLeft] = useState(40 * 60); // 40 phút
            const [appData, setAppData] = useState({});
            const [saveStatus, setSaveStatus] = useState("Đã lưu");
            
            const [modal, setModal] = useState({ isOpen: false, message: '' });

            useEffect(() => {
                if (!auth || !db) {
                    setIsReady(true);
                    return;
                }

                const initFirebase = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error(e); }
                };
                
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    setUser(u);
                    if (u) {
                        try {
                            const docRef = doc(db, 'artifacts', appId, 'users', u.uid, 'math_lesson_v2', 'progress');
                            const snap = await getDoc(docRef);
                            if (snap.exists()) {
                                const dbData = snap.data();
                                setStudentName(dbData.studentName || "");
                                setAppData(dbData.appData || {});
                                if (dbData.currentStation) setCurrentStation(dbData.currentStation);
                                if (dbData.timeLeft) setTimeLeft(dbData.timeLeft);
                            }
                        } catch (e) { console.error("Load error:", e); }
                    }
                    setIsReady(true);
                });

                initFirebase();
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (currentStation > 0 && timeLeft > 0) {
                    const timerId = setInterval(() => setTimeLeft(t => t - 1), 1000);
                    return () => clearInterval(timerId);
                }
            }, [currentStation, timeLeft]);

            const syncToCloud = async (newData, newStation) => {
                if (!user || !db) return;
                setSaveStatus("Đang lưu...");
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'math_lesson_v2', 'progress');
                    await setDoc(docRef, {
                        studentName,
                        currentStation: newStation !== undefined ? newStation : currentStation,
                        appData: newData || appData,
                        timeLeft,
                        lastUpdated: new Date()
                    }, { merge: true });
                    setSaveStatus("Đã lưu trên Cloud ☁️");
                } catch (e) {
                    console.error("Save error:", e);
                    setSaveStatus("Lỗi lưu!");
                }
            };

            const updateData = (key, val) => {
                const newData = { ...appData, [key]: val };
                setAppData(newData);
                syncToCloud(newData); 
            };

            const showAlert = (message) => {
                setModal({ isOpen: true, message });
            };

            const handleStart = () => {
                if (!studentName.trim()) { showAlert("Em nhập tên để bắt đầu hành trình nhé!"); return; }
                setCurrentStation(1);
                syncToCloud(appData, 1);
            };

            const goNext = () => {
                // KIỂM TRA KHÓA TRẠM 1
                if (currentStation === 1) {
                    const q1 = hasAllVertices(appData.s1_q1);
                    const q2 = hasAllDiagonals(appData.s1_q2);
                    const q3 = hasAllSideFaces(appData.s1_q3);
                    const q4 = hasProperties(appData.s1_q4);
                    const q5 = hasCubeBases(appData.s1_q5);
                    const q6 = hasCubeEdges(appData.s1_q6);
                    
                    if (!(q1 && q2 && q3 && q4 && q5 && q6)) {
                        showAlert("Em phải trả lời ĐÚNG CẢ 6 CÂU ở Trạm 1 thì mới được mở khóa đi tiếp nhé! Hãy cố gắng lên!");
                        return;
                    }
                }

                if (currentStation < 5) {
                    setCurrentStation(prev => prev + 1);
                    syncToCloud(appData, currentStation + 1);
                    window.scrollTo(0,0);
                }
            };

            const goPrev = () => {
                if (currentStation > 1) {
                    setCurrentStation(prev => prev - 1);
                    syncToCloud(appData, currentStation - 1);
                    window.scrollTo(0,0);
                }
            };

            const formatTime = (sec) => `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;

            if (!isReady) return <div className="min-h-screen flex items-center justify-center font-bold text-indigo-600">Đang tải hệ thống...</div>;

            // --- RENDER LOGIN ---
            if (currentStation === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{backgroundImage: 'radial-gradient(#e0e7ff 1px, transparent 1px)', backgroundSize: '20px 20px'}}>
                        <AlertModal isOpen={modal.isOpen} message={modal.message} onClose={() => setModal({isOpen: false, message: ''})} />
                        
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-indigo-100 text-center station-enter">
                            <div className="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                            </div>
                            <h1 className="text-3xl font-extrabold text-indigo-900 mb-2">Toán 7: Hình Khối</h1>
                            <p className="text-slate-500 mb-6 text-sm">Hành trình khám phá Hình hộp chữ nhật & Hình lập phương</p>
                            
                            <input 
                                type="text" 
                                value={studentName} onChange={e => setStudentName(e.target.value)}
                                placeholder="Nhập Họ và Tên của em"
                                className="w-full p-4 mb-4 border-2 border-indigo-100 rounded-xl outline-none focus:border-indigo-500 text-center font-bold text-lg"
                                onKeyPress={e => e.key === 'Enter' && handleStart()}
                            />
                            <button onClick={handleStart} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-md hover:shadow-lg">
                                BẮT ĐẦU CHUYẾN ĐI
                            </button>
                            <p className="mt-4 text-xs text-slate-400">💡 Cứ yên tâm học, F5 thoải mái hệ thống tự lưu bài.</p>
                        </div>
                    </div>
                );
            }

            const isTrạm1Locked = currentStation === 1 && !(hasAllVertices(appData.s1_q1) && hasAllDiagonals(appData.s1_q2) && hasAllSideFaces(appData.s1_q3) && hasProperties(appData.s1_q4) && hasCubeBases(appData.s1_q5) && hasCubeEdges(appData.s1_q6));

            // --- RENDER APP ---
            return (
                <div className="min-h-screen pb-24">
                    <AlertModal isOpen={modal.isOpen} message={modal.message} onClose={() => setModal({isOpen: false, message: ''})} />
                    
                    {/* Header */}
                    <header className="bg-indigo-800 text-white sticky top-0 z-40 shadow-md">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="font-bold hidden sm:block">Chào {studentName}!</div>
                            
                            <div className="flex gap-2">
                                {[1,2,3,4,5].map(st => (
                                    <div key={st} 
                                         className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${st === currentStation ? 'bg-amber-400 text-indigo-900 scale-110 shadow' : st < currentStation ? 'bg-indigo-500' : 'bg-indigo-900 text-indigo-400'}`}>
                                        {st}
                                    </div>
                                ))}
                            </div>

                            <div className={`flex items-center gap-1 font-mono font-bold ${timeLeft < 300 ? 'text-red-400 animate-pulse' : 'text-emerald-300'}`}>
                                <IconClock /> {formatTime(timeLeft)}
                            </div>
                        </div>
                    </header>

                    {/* Main */}
                    <main className="max-w-4xl mx-auto p-4 mt-6 relative z-10">
                        {currentStation === 1 && <Station1 data={appData} updateData={updateData} showAlert={showAlert} />}
                        {currentStation === 2 && <Station2 />}
                        {currentStation === 3 && <Station3 data={appData} updateData={updateData} showAlert={showAlert} />}
                        {currentStation === 4 && <Station4 data={appData} updateData={updateData} />}
                        {currentStation === 5 && <Station5 data={appData} updateData={updateData} showAlert={showAlert} />}
                    </main>

                    {/* Footer Nav */}
                    <footer className="fixed bottom-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <button onClick={goPrev} disabled={currentStation === 1} className="px-5 py-2.5 font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg disabled:opacity-50">
                                Quay lại
                            </button>
                            
                            <div className="text-xs font-medium text-indigo-500 hidden sm:flex items-center gap-1">
                                <IconCloud /> {saveStatus}
                            </div>

                            <button onClick={goNext} disabled={currentStation === 5} className={`px-6 py-2.5 font-bold text-white rounded-lg shadow disabled:opacity-50 transition-colors ${isTrạm1Locked ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                {isTrạm1Locked ? <><IconLock className="inline mb-1"/> Bị khóa</> : 'Trạm tiếp theo ➔'}
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
